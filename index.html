<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FlixForge · IMDb & YouTube Link Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    /* dark netflix-inspired gradient */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(229, 9, 20, 0.12) 0%, rgba(0, 0, 0, 0.92) 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* main card - desktop focused, clean, subtle glass */
    .card {
      max-width: 820px;
      width: 100%;
      background: rgba(18, 18, 24, 0.92);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      box-shadow: 0 30px 55px -12px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(255, 255, 255, 0.06);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      z-index: 2;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 35px 60px -14px rgba(0, 0, 0, 0.8);
    }

    /* header with netflix red */
    .header {
      background: linear-gradient(135deg, #e50914 0%, #b20710 100%);
      padding: 1.8rem 2.2rem;
      color: white;
    }

    .header h1 {
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .header h1 .logo-icon {
      font-size: 2rem;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
    }

    .header h1 span {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      font-size: 0.8rem;
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .subhead {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 0.6rem;
      font-weight: 400;
    }

    /* mode selector - clean desktop pill */
    .mode-section {
      padding: 2rem 2.2rem 0.8rem 2.2rem;
    }

    .mode-toggle {
      display: flex;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.45);
      padding: 0.5rem;
      border-radius: 80px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .mode-btn {
      flex: 1;
      text-align: center;
      padding: 0.9rem 0;
      border: none;
      background: transparent;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: -0.2px;
    }

    .mode-btn i {
      font-style: normal;
      font-weight: 500;
      font-size: 1.1rem;
    }

    .mode-btn.active {
      background: #e50914;
      color: white;
      box-shadow: 0 4px 12px rgba(229, 9, 20, 0.35);
    }

    /* input panel */
    .action-panel {
      padding: 1.8rem 2.2rem 1rem 2.2rem;
    }

    .input-group {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .input-wrapper {
      flex: 1;
    }

    .url-input {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 0.95rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #12121a;
      border: 1.5px solid #2a2a34;
      border-radius: 60px;
      transition: all 0.2s;
      outline: none;
      color: #f0f0f0;
      letter-spacing: -0.2px;
    }

    .url-input:focus {
      border-color: #e50914;
      box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.25);
      background: #181822;
    }

    .url-input::placeholder {
      color: #6a6a7a;
      font-weight: 400;
    }

    .go-btn {
      background: #e50914;
      border: none;
      padding: 0 2.2rem;
      height: 56px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
      white-space: nowrap;
    }

    .go-btn:hover {
      background: #f81c27;
      transform: scale(0.97);
      box-shadow: 0 6px 14px rgba(229, 9, 20, 0.5);
    }

    /* instruction panel - clean, no extra "magic transform" lines */
    .info-container {
      margin: 1.2rem 2.2rem 2rem 2.2rem;
    }

    .instruction-card {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.4rem 1.8rem;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .instruction-card.play-bg {
      border-left: 4px solid #e50914;
      background: linear-gradient(120deg, rgba(229, 9, 20, 0.06), rgba(0, 0, 0, 0.3));
    }

    .instruction-card.download-bg {
      border-left: 4px solid #f97316;
      background: linear-gradient(120deg, rgba(249, 115, 22, 0.06), rgba(0, 0, 0, 0.3));
    }

    .instruction-header {
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #c0c0d0;
    }

    .instruction-body {
      font-size: 0.95rem;
      color: #e6e6ee;
      line-height: 1.5;
    }

    .step-list {
      list-style: none;
    }

    .step-list li {
      margin-bottom: 12px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .step-number {
      background: rgba(229, 9, 20, 0.7);
      width: 24px;
      height: 24px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .clickable-link {
      color: #e50914;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dashed rgba(229, 9, 20, 0.5);
      transition: all 0.15s;
    }

    .clickable-link:hover {
      color: #ff3b44;
      border-bottom-color: #e50914;
    }

    .youtube-link {
      color: #f97316;
      border-bottom-color: rgba(249, 115, 22, 0.5);
    }

    .youtube-link:hover {
      color: #ff9f4a;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.75rem;
      opacity: 0.7;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 14px;
      letter-spacing: 0.2px;
    }

    footer {
      padding: 1rem 2.2rem 1.8rem 2.2rem;
      font-size: 0.7rem;
      text-align: center;
      color: #7e7e8c;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 680px) {
      .input-group {
        flex-direction: column;
        align-items: stretch;
      }
      .go-btn {
        justify-content: center;
      }
      .mode-toggle {
        gap: 0.6rem;
      }
      body {
        padding: 1rem;
      }
      .card {
        border-radius: 1.5rem;
      }
    }

    /* toast message */
    .flix-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #141414;
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 9999;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      font-family: inherit;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>
      <span class="logo-icon">🎬</span> FlixForge
      <span>desktop tool</span>
    </h1>
    <div class="subhead">Transform your links instantly — cinema-grade redirection</div>
  </div>

  <div class="mode-section">
    <div class="mode-toggle" id="modeToggle">
      <button id="playModeBtn" class="mode-btn active">
        <i>🎥</i> Play Movies on IMDb
      </button>
      <button id="downloadModeBtn" class="mode-btn">
        <i>⬇️</i> Download in YouTube
      </button>
    </div>
  </div>

  <div class="action-panel">
    <div class="input-group">
      <div class="input-wrapper">
        <input type="text" id="urlInput" class="url-input" placeholder="Paste full link here... (IMDb or YouTube)" autocomplete="off">
      </div>
      <button id="goButton" class="go-btn">▶ Launch &nbsp;→</button>
    </div>
  </div>

  <div class="info-container" id="instructionContainer">
    <!-- dynamic content with clickable IMDb.com / YouTube.com, no "magic transform" text -->
  </div>

  <footer>
    ⚡ smart injection: <strong style="color:#e50914;">www.playimdb.com</strong> &nbsp;|&nbsp; <strong style="color:#f97316;">www.ssyoutube.com</strong>
  </footer>
</div>

<script>
  // DOM elements
  const playModeBtn = document.getElementById('playModeBtn');
  const downloadModeBtn = document.getElementById('downloadModeBtn');
  const urlInput = document.getElementById('urlInput');
  const goButton = document.getElementById('goButton');
  const instructionContainer = document.getElementById('instructionContainer');

  let currentMode = 'imdb'; // 'imdb' or 'youtube'

  // Helper: show toast
  function showToast(message, isError = false) {
    const existing = document.querySelector('.flix-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'flix-toast';
    toast.textContent = message;
    toast.style.backgroundColor = isError ? '#b20710' : '#1a1a24';
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.2s';
      setTimeout(() => toast.remove(), 250);
    }, 2300);
  }

  // Core transform: add "play" or "ss" directly AFTER "www." (no extra dot)
  // Example: www.imdb.com → www.playimdb.com , www.youtube.com → www.ssyoutube.com
  function transformLink(originalLink, mode) {
    let raw = originalLink.trim();
    if (!raw) return null;
    
    let finalUrl = raw;
    if (!raw.startsWith('http://') && !raw.startsWith('https://')) {
      finalUrl = 'https://' + raw;
    }
    
    let urlObj;
    try {
      urlObj = new URL(finalUrl);
    } catch (err) {
      showToast('❌ Invalid URL. Please paste a complete link (https://...)', true);
      return null;
    }
    
    let host = urlObj.hostname;
    const keyword = (mode === 'imdb') ? 'play' : 'ss';
    
    if (host.includes('www.')) {
      const parts = host.split('www.');
      if (parts.length >= 2) {
        const afterWww = parts[1];
        const newHost = parts[0] + 'www.' + keyword + afterWww;
        urlObj.hostname = newHost;
      } else {
        urlObj.hostname = host.replace('www.', 'www.' + keyword);
      }
    } else {
      // if no www, prepend www.keyword
      urlObj.hostname = 'www.' + keyword + host;
    }
    
    // clean double dots edge case
    urlObj.hostname = urlObj.hostname.replace(/\.\.+/g, '.');
    return urlObj.toString();
  }
  
  // handle redirect
  function handleGo() {
    const rawUrl = urlInput.value.trim();
    if (!rawUrl) {
      showToast('📋 Please paste a link from IMDb or YouTube');
      urlInput.focus();
      return;
    }
    
    // gentle mode hints (non-blocking)
    const lower = rawUrl.toLowerCase();
    if (currentMode === 'imdb' && !lower.includes('imdb.com')) {
      showToast('🎬 IMDb mode active — paste an IMDb movie link for best results');
    }
    if (currentMode === 'youtube' && !lower.includes('youtube.com') && !lower.includes('youtu.be')) {
      showToast('📺 YouTube mode active — paste a valid YouTube video URL');
    }
    
    const transformed = transformLink(rawUrl, currentMode);
    if (!transformed) return;
    
    window.open(transformed, '_blank');
    const keyword = (currentMode === 'imdb') ? 'play' : 'ss';
    showToast(`✨ Redirected! Added "${keyword}" after www. → new tab opened`);
    
    // micro feedback
    goButton.style.transform = 'scale(0.96)';
    setTimeout(() => { goButton.style.transform = ''; }, 130);
  }
  
  // Update instruction content: clean steps, clickable imdb.com/youtube.com, NO "magic transform" lines
  function updateInstructions() {
    instructionContainer.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'instruction-card';
    
    if (currentMode === 'imdb') {
      card.classList.add('play-bg');
      card.innerHTML = `
        <div class="instruction-header">
          <span>🎬 PLAY MODE · STREAM ON DEMAND</span>
        </div>
        <div class="instruction-body">
          <ul class="step-list">
            <li><span class="step-number">1</span> Go to <a href="https://www.imdb.com/" target="_blank" class="clickable-link">IMDb.com</a> and search for any movie or series you want to watch.</li>
            <li><span class="step-number">2</span> Copy the full URL from your browser's address bar.</li>
            <li><span class="step-number">3</span> Paste the link above and press <strong style="color:#e50914;">"Launch →"</strong></li>
          </ul>
          <div class="footer-note">
            🔗 The tool adds <code style="background:#1e1e2a; padding:2px 6px; border-radius:12px;">play</code> right after <code style="background:#1e1e2a; padding:2px 6px; border-radius:12px;">www.</code>
          </div>
        </div>
      `;
    } 
    else { // youtube download mode
      card.classList.add('download-bg');
      card.innerHTML = `
        <div class="instruction-header">
          <span>📥 DOWNLOAD MODE · SAVE VIDEOS</span>
        </div>
        <div class="instruction-body">
          <ul class="step-list">
            <li><span class="step-number">1</span> Open <a href="https://www.youtube.com/" target="_blank" class="clickable-link youtube-link">YouTube.com</a> and go to the video you wish to download.</li>
            <li><span class="step-number">2</span> Copy the full video URL from the address bar.</li>
            <li><span class="step-number">3</span> Paste the link and click <strong style="color:#f97316;">"Launch →"</strong></li>
          </ul>
          <div class="footer-note">
            📀 The tool adds <code style="background:#1e1e2a; padding:2px 6px; border-radius:12px;">ss</code> after <code style="background:#1e1e2a; padding:2px 6px; border-radius:12px;">www.</code><br>
            <span style="font-size:0.7rem;">Opens a new tab where download options are available.</span>
          </div>
        </div>
      `;
    }
    instructionContainer.appendChild(card);
    
    // update placeholder for desktop clarity
    if (currentMode === 'imdb') {
      urlInput.placeholder = "Paste IMDb movie link... e.g., https://www.imdb.com/title/tt0111161/";
    } else {
      urlInput.placeholder = "Paste YouTube video link... e.g., https://www.youtube.com/watch?v=VIDEO_ID";
    }
  }
  
  // set active mode and update UI
  function setActiveMode(mode) {
    currentMode = mode;
    if (mode === 'imdb') {
      playModeBtn.classList.add('active');
      downloadModeBtn.classList.remove('active');
    } else {
      downloadModeBtn.classList.add('active');
      playModeBtn.classList.remove('active');
    }
    updateInstructions();
    // subtle feedback
    if (mode === 'imdb') {
      showToast('🎬 IMDb play mode active — links become www.playimdb.com');
    } else {
      showToast('📥 YouTube download mode active — links become www.ssyoutube.com');
    }
  }
  
  // event listeners
  playModeBtn.addEventListener('click', () => {
    if (currentMode === 'imdb') return;
    setActiveMode('imdb');
  });
  
  downloadModeBtn.addEventListener('click', () => {
    if (currentMode === 'youtube') return;
    setActiveMode('youtube');
  });
  
  goButton.addEventListener('click', handleGo);
  urlInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleGo();
    }
  });
  
  // trim on paste & blur
  urlInput.addEventListener('paste', () => {
    setTimeout(() => {
      urlInput.value = urlInput.value.trim();
    }, 5);
  });
  
  // initialization
  setActiveMode('imdb');
  
  // console signature
  console.log('🎬 FlixForge ready | desktop optimized | clean instructions');
</script>
</body>
</html>
